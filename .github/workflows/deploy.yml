name: Build for Radxa Zero 3W

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Installer la toolchain Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-gnu

    - name: Installer l'outil 'cross'
      run: cargo install cross --git https://github.com/cross-rs/cross

    - name: Cache des dépendances Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Générer le lockfile si absent
      run: cargo generate-lockfile

    - name: Compilation croisée (Release)
      run: cross build --target aarch64-unknown-linux-gnu --release

    - name: Téléverser le binaire compilé
      uses: actions/upload-artifact@v4
      with:
        name: kodi-ftp-proxy-aarch64
        path: target/aarch64-unknown-linux-gnu/release/kodi-ftp-proxy
